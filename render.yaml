# ============================================================================
# Poseidon — Render Blueprint
# ============================================================================

services:
  # ── Core API ───────────────────────────────────────────────────────────────
  - type: web
    name: poseidon-core
    runtime: docker
    dockerfilePath: services/core/Dockerfile
    dockerContext: services
    plan: free
    healthCheckPath: /ready
    envVars:
      - key: PORT
        value: "8001"
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        value: ""
      - key: JWT_SECRET
        generateValue: true
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRY_HOURS
        value: "8"
      - key: MINIO_ENDPOINT
        value: ""
      - key: MINIO_ACCESS_KEY
        value: ""
      - key: MINIO_SECRET_KEY
        value: ""
      - key: MINIO_BUCKET
        value: poseidon-docs
      - key: MINIO_SECURE
        value: "false"
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: PHI_IN_LOGS
        value: "false"
      - key: SERVICE_NAME
        value: core

  # ── Trident ML ─────────────────────────────────────────────────────────────
  - type: web
    name: poseidon-trident
    runtime: docker
    dockerfilePath: services/trident/Dockerfile
    dockerContext: services
    plan: free
    healthCheckPath: /ready
    envVars:
      - key: PORT
        value: "8002"
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        value: ""
      - key: JWT_SECRET
        generateValue: true
      - key: SECRET_KEY
        generateValue: true
      - key: SERVICE_NAME
        value: trident

  # ── Intake ─────────────────────────────────────────────────────────────────
  - type: web
    name: poseidon-intake
    runtime: docker
    dockerfilePath: services/intake/Dockerfile
    dockerContext: services
    plan: free
    healthCheckPath: /ready
    envVars:
      - key: PORT
        value: "8003"
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        value: ""
      - key: JWT_SECRET
        generateValue: true
      - key: SECRET_KEY
        generateValue: true
      - key: SERVICE_NAME
        value: intake

  # ── ML Service ─────────────────────────────────────────────────────────────
  - type: web
    name: poseidon-ml
    runtime: docker
    dockerfilePath: services/ml/Dockerfile
    dockerContext: services
    plan: free
    healthCheckPath: /ready
    envVars:
      - key: PORT
        value: "8004"
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        value: ""
      - key: JWT_SECRET
        generateValue: true
      - key: SECRET_KEY
        generateValue: true
      - key: SERVICE_NAME
        value: ml

  # ── EDI Service ────────────────────────────────────────────────────────────
  - type: web
    name: poseidon-edi
    runtime: docker
    dockerfilePath: services/edi/Dockerfile
    dockerContext: services/edi
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8006"
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        value: ""
      - key: STEDI_API_KEY
        value: ""
      - key: EDI_DRY_RUN
        value: "true"
      - key: SUBMISSION_METHOD
        value: stedi_api
      - key: SERVICE_NAME
        value: edi

  # ── Dashboard (Next.js) ────────────────────────────────────────────────────
  - type: web
    name: poseidon-dashboard
    runtime: docker
    dockerfilePath: frontend/Dockerfile
    dockerContext: frontend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: "3000"
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        sync: false
      - key: CORE_API_URL
        sync: false
      - key: TRIDENT_API_URL
        sync: false
      - key: INTAKE_API_URL
        sync: false
      - key: ML_API_URL
        sync: false
      - key: EDI_API_URL
        sync: false
      - key: SINCH_PROJECT_ID
        sync: false
      - key: SINCH_KEY_ID
        sync: false
      - key: SINCH_KEY_SECRET
        sync: false
