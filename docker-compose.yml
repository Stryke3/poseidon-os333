# =============================================================================
# POSEIDON Healthcare RCM Platform — StrykeFox
# Production Docker Compose
# =============================================================================

networks:
  poseidon_net:
    driver: bridge

volumes:
  redis_data:
  minio_data:
  training_data:

services:

  # ---------------------------------------------------------------------------
  # INFRASTRUCTURE
  # ---------------------------------------------------------------------------

  redis:
    image: redis:7.4.8-alpine
    container_name: poseidon_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - poseidon_net
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-04-03T14-56-28Z
    container_name: poseidon_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    networks:
      - poseidon_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # APPLICATION SERVICES
  # ---------------------------------------------------------------------------

  core:
    build:
      context: ./services
      dockerfile: core/Dockerfile
    container_name: poseidon_core
    restart: unless-stopped
    env_file: .env
    environment:
      SERVICE_NAME: core
      PORT: 8001
    volumes:
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - poseidon_net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-H", "Host: api.strykefox.com", "http://127.0.0.1:8001/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  trident:
    build:
      context: ./services
      dockerfile: trident/Dockerfile
    container_name: poseidon_trident
    restart: unless-stopped
    env_file: .env
    environment:
      SERVICE_NAME: trident
      PORT: 8002
    volumes:
      - ./data:/app/data
      - ./services/trident/Historical_Model_Data:/app/Historical_Model_Data
      - training_data:/app/models
    networks:
      - poseidon_net
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-H", "Host: trident.strykefox.com", "http://127.0.0.1:8002/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  intake:
    build:
      context: ./services
      dockerfile: intake/Dockerfile
    container_name: poseidon_intake
    restart: unless-stopped
    env_file: .env
    environment:
      SERVICE_NAME: intake
      PORT: 8003
    volumes:
      - ./data:/app/data
    networks:
      - poseidon_net
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-H", "Host: intake.strykefox.com", "http://127.0.0.1:8003/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  ml:
    build:
      context: ./services
      dockerfile: ml/Dockerfile
    container_name: poseidon_ml
    restart: unless-stopped
    env_file: .env
    environment:
      SERVICE_NAME: ml
      PORT: 8004
    volumes:
      - ./data:/app/data
      - training_data:/app/models
    networks:
      - poseidon_net
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-H", "Host: ml.strykefox.com", "http://127.0.0.1:8004/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  edi:
    build:
      context: ./services/edi
      dockerfile: Dockerfile
    container_name: poseidon_edi
    restart: unless-stopped
    env_file: .env
    environment:
      SERVICE_NAME: edi
      PORT: 8006
      # EDI service expects a single DATABASE_URL env var.
      DATABASE_URL: ${DATABASE_URL}
      STEDI_API_KEY: ${STEDI_API_KEY:-}
      ISA_SENDER_ID: ${ISA_SENDER_ID:-STRYKEFOX      }
      ISA_RECEIVER_ID: ${ISA_RECEIVER_ID:-030240928      }
      ISA_SENDER_QUAL: ${ISA_SENDER_QUAL:-ZZ}
      ISA_RECEIVER_QUAL: ${ISA_RECEIVER_QUAL:-ZZ}
      EDI_DRY_RUN: ${EDI_DRY_RUN:-false}
      SUBMISSION_METHOD: ${SUBMISSION_METHOD:-stedi_api}
      ISA_TEST_INDICATOR: ${ISA_TEST_INDICATOR:-P}
      BILLING_NPI: ${BILLING_NPI:-1821959420}
      BILLING_TAX_ID: ${BILLING_TAX_ID:-393429726}
      BILLING_ORG_NAME: ${BILLING_ORG_NAME:-STRYKEFOX MEDICAL}
      BILLING_TAXONOMY: ${BILLING_TAXONOMY:-332B00000X}
      BILLING_PHONE: ${BILLING_PHONE:-6124996561}
      AVAILITY_SFTP_USER: ${AVAILITY_SFTP_USER:-}
      AVAILITY_SFTP_PASS: ${AVAILITY_SFTP_PASS:-}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - poseidon_net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8006/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  availity:
    build:
      context: ./services/availity
      dockerfile: Dockerfile
    container_name: poseidon_availity
    restart: unless-stopped
    env_file: .env
    environment:
      SERVICE_NAME: availity
      PORT: 8005
      DATABASE_URL: ${DATABASE_URL}
    networks:
      - poseidon_net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8005/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  # ---------------------------------------------------------------------------
  # FRONTEND
  # ---------------------------------------------------------------------------

  dashboard:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_AVAILITY_SERVICE_URL: ${NEXT_PUBLIC_AVAILITY_SERVICE_URL:-/availity-api}
    container_name: poseidon_dashboard
    restart: unless-stopped
    env_file: .env
    environment:
      SERVICE_NAME: dashboard
      PORT: 3000
      # Server-side proxy for admin Availity routes (/api/integrations/availity/*)
      AVAILITY_SERVICE_URL: ${AVAILITY_SERVICE_URL:-http://availity:8005}
      # EDI service proxy (837P/835)
      EDI_API_URL: ${EDI_API_URL:-http://edi:8006}
      # Matia merge (optional): set MATIA_INTEGRATION_ENABLED=true and MATIA_API_URL=http://nginx/matia-api
      MATIA_API_URL: ${MATIA_API_URL:-}
      MATIA_PIPELINE_PATH: ${MATIA_PIPELINE_PATH:-/pipeline}
      MATIA_API_BEARER: ${MATIA_API_BEARER:-}
      MATIA_INTEGRATION_ENABLED: ${MATIA_INTEGRATION_ENABLED:-false}
    networks:
      poseidon_net:
        aliases:
          - dashboard
    depends_on:
      - core
      - trident
      - availity
      - edi
    healthcheck:
      test: ["CMD", "wget", "--header=Host: dashboard.strykefox.com", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ---------------------------------------------------------------------------
  # REVERSE PROXY
  # ---------------------------------------------------------------------------

  nginx:
    image: nginx:1.29.6-alpine
    container_name: poseidon_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - poseidon_net
    depends_on:
      - core
      - trident
      - intake
      - ml
      - availity
      - edi
      - dashboard
    healthcheck:
      test: ["CMD", "wget", "--header=Host: dashboard.strykefox.com", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
