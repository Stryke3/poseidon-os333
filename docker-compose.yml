# =============================================================================
# POSEIDON Healthcare RCM Platform — StrykeFox
# Production Docker Compose
#
# Local run (no cloud DB): start Docker, then from repo root:
#   ./scripts/docker-up.sh
# Or: copy .env.template to .env, then  docker compose up -d --build
# Compose defaults: Postgres on :5432, DB poseidon/poseidon, Redis password
# localredis, INTERNAL_API_KEY poseidon-local-internal-key, EDI dry-run ON.
# DB for app containers: use POSEIDON_DATABASE_URL to override bundled Postgres.
# Do not rely on DATABASE_URL from .env for Compose — that broke many setups (stale cloud URLs).
# Override in .env for production (especially INTERNAL_API_KEY).
# =============================================================================

networks:
  poseidon_net:
    driver: bridge

volumes:
  redis_data:
  minio_data:
  training_data:
  postgres_data:

services:

  # ---------------------------------------------------------------------------
  # INFRASTRUCTURE
  # ---------------------------------------------------------------------------

  redis:
    image: redis:7.4.8-alpine
    container_name: poseidon_redis
    restart: unless-stopped
    command: redis-server --requirepass ${POSEIDON_REDIS_PASSWORD:-localredis}
    volumes:
      - redis_data:/data
    networks:
      - poseidon_net
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${POSEIDON_REDIS_PASSWORD:-localredis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-04-03T14-56-28Z
    container_name: poseidon_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${POSEIDON_MINIO_ACCESS_KEY:-poseidon}
      MINIO_ROOT_PASSWORD: ${POSEIDON_MINIO_SECRET_KEY:-poseidonlocal}
    volumes:
      - minio_data:/data
    networks:
      - poseidon_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:16-alpine
    container_name: poseidon_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSEIDON_POSTGRES_USER:-poseidon}
      POSTGRES_PASSWORD: ${POSEIDON_POSTGRES_PASSWORD:-poseidon}
      POSTGRES_DB: ${POSEIDON_POSTGRES_DB:-poseidon_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - poseidon_net
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s

  # ---------------------------------------------------------------------------
  # APPLICATION SERVICES
  # ---------------------------------------------------------------------------

  core:
    build:
      context: ./services
      dockerfile: core/Dockerfile
    container_name: poseidon_core
    restart: unless-stopped
    env_file: .env
    environment:
      SERVICE_NAME: core
      PORT: 8001
      # Shared base defaults ENVIRONMENT to production; placeholder .env secrets then abort startup.
      ENVIRONMENT: ${ENVIRONMENT:-development}
      EDI_API_URL: ${EDI_API_URL:-http://edi:8006}
      DATABASE_URL: ${POSEIDON_DATABASE_URL:-postgresql://poseidon:poseidon@postgres:5432/poseidon_db}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-poseidon-local-internal-key}
      MINIO_ENDPOINT: ${POSEIDON_MINIO_ENDPOINT:-minio:9000}
      MINIO_PUBLIC_ENDPOINT: ${POSEIDON_MINIO_PUBLIC_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${POSEIDON_MINIO_ACCESS_KEY:-poseidon}
      MINIO_SECRET_KEY: ${POSEIDON_MINIO_SECRET_KEY:-poseidonlocal}
      MINIO_BUCKET: ${POSEIDON_MINIO_BUCKET:-poseidon-docs}
      MINIO_SECURE: ${POSEIDON_MINIO_SECURE:-false}
      REDIS_PASSWORD: ${POSEIDON_REDIS_PASSWORD:-localredis}
      REDIS_URL: ${POSEIDON_REDIS_URL:-redis://:localredis@redis:6379/0}
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      # Local `next dev`: set CORE_API_URL=http://127.0.0.1:8001 in frontend/.env.local
      - "127.0.0.1:8001:8001"
    networks:
      - poseidon_net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-H", "Host: api.strykefox.com", "http://127.0.0.1:8001/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  trident:
    build:
      context: ./services
      dockerfile: trident/Dockerfile
    container_name: poseidon_trident
    restart: unless-stopped
    env_file: .env
    environment:
      SERVICE_NAME: trident
      PORT: 8002
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE_URL: ${POSEIDON_DATABASE_URL:-postgresql://poseidon:poseidon@postgres:5432/poseidon_db}
      REDIS_PASSWORD: ${POSEIDON_REDIS_PASSWORD:-localredis}
      REDIS_URL: ${POSEIDON_REDIS_URL:-redis://:localredis@redis:6379/0}
      MINIO_ENDPOINT: ${POSEIDON_MINIO_ENDPOINT:-minio:9000}
      MINIO_PUBLIC_ENDPOINT: ${POSEIDON_MINIO_PUBLIC_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${POSEIDON_MINIO_ACCESS_KEY:-poseidon}
      MINIO_SECRET_KEY: ${POSEIDON_MINIO_SECRET_KEY:-poseidonlocal}
      MINIO_BUCKET: ${POSEIDON_MINIO_BUCKET:-poseidon-docs}
      MINIO_SECURE: ${POSEIDON_MINIO_SECURE:-false}
    volumes:
      - ./data:/app/data
      - ./services/trident/Historical_Model_Data:/app/Historical_Model_Data
      - training_data:/app/models
    networks:
      - poseidon_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-H", "Host: trident.strykefox.com", "http://127.0.0.1:8002/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  intake:
    build:
      context: ./services
      dockerfile: intake/Dockerfile
    container_name: poseidon_intake
    restart: unless-stopped
    env_file: .env
    environment:
      SERVICE_NAME: intake
      PORT: 8003
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE_URL: ${POSEIDON_DATABASE_URL:-postgresql://poseidon:poseidon@postgres:5432/poseidon_db}
      REDIS_PASSWORD: ${POSEIDON_REDIS_PASSWORD:-localredis}
      REDIS_URL: ${POSEIDON_REDIS_URL:-redis://:localredis@redis:6379/0}
      MINIO_ENDPOINT: ${POSEIDON_MINIO_ENDPOINT:-minio:9000}
      MINIO_PUBLIC_ENDPOINT: ${POSEIDON_MINIO_PUBLIC_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${POSEIDON_MINIO_ACCESS_KEY:-poseidon}
      MINIO_SECRET_KEY: ${POSEIDON_MINIO_SECRET_KEY:-poseidonlocal}
      MINIO_BUCKET: ${POSEIDON_MINIO_BUCKET:-poseidon-docs}
      MINIO_SECURE: ${POSEIDON_MINIO_SECURE:-false}
    volumes:
      - ./data:/app/data
    networks:
      - poseidon_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-H", "Host: intake.strykefox.com", "http://127.0.0.1:8003/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # POSEIDON LITE: patient repository + compliance document generator (minimal API)
  lite:
    build:
      context: ./services
      dockerfile: lite/Dockerfile
    container_name: poseidon_lite
    restart: unless-stopped
    env_file: .env
    environment:
      SERVICE_NAME: lite
      PORT: 8010
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE_URL: ${POSEIDON_DATABASE_URL:-postgresql://poseidon:poseidon@postgres:5432/poseidon_db}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-poseidon-local-internal-key}
      LITE_DATA_DIR: /app/data/lite_files
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8010:8010"
    networks:
      - poseidon_net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8010/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  ml:
    build:
      context: ./services
      dockerfile: ml/Dockerfile
    container_name: poseidon_ml
    restart: unless-stopped
    env_file: .env
    environment:
      SERVICE_NAME: ml
      PORT: 8004
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE_URL: ${POSEIDON_DATABASE_URL:-postgresql://poseidon:poseidon@postgres:5432/poseidon_db}
      REDIS_PASSWORD: ${POSEIDON_REDIS_PASSWORD:-localredis}
      REDIS_URL: ${POSEIDON_REDIS_URL:-redis://:localredis@redis:6379/0}
      MINIO_ENDPOINT: ${POSEIDON_MINIO_ENDPOINT:-minio:9000}
      MINIO_PUBLIC_ENDPOINT: ${POSEIDON_MINIO_PUBLIC_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${POSEIDON_MINIO_ACCESS_KEY:-poseidon}
      MINIO_SECRET_KEY: ${POSEIDON_MINIO_SECRET_KEY:-poseidonlocal}
      MINIO_BUCKET: ${POSEIDON_MINIO_BUCKET:-poseidon-docs}
      MINIO_SECURE: ${POSEIDON_MINIO_SECURE:-false}
    volumes:
      - ./data:/app/data
      - training_data:/app/models
    networks:
      - poseidon_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-H", "Host: ml.strykefox.com", "http://127.0.0.1:8004/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  edi:
    build:
      context: ./services/edi
      dockerfile: Dockerfile
    container_name: poseidon_edi
    restart: unless-stopped
    env_file: .env
    environment:
      SERVICE_NAME: edi
      PORT: 8006
      DATABASE_URL: ${POSEIDON_DATABASE_URL:-postgresql://poseidon:poseidon@postgres:5432/poseidon_db}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-poseidon-local-internal-key}
      MINIO_ENDPOINT: ${POSEIDON_MINIO_ENDPOINT:-minio:9000}
      MINIO_PUBLIC_ENDPOINT: ${POSEIDON_MINIO_PUBLIC_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${POSEIDON_MINIO_ACCESS_KEY:-poseidon}
      MINIO_SECRET_KEY: ${POSEIDON_MINIO_SECRET_KEY:-poseidonlocal}
      MINIO_BUCKET: ${POSEIDON_MINIO_BUCKET:-poseidon-docs}
      MINIO_SECURE: ${POSEIDON_MINIO_SECURE:-false}
      STEDI_API_KEY: ${STEDI_API_KEY:-}
      ISA_SENDER_ID: ${ISA_SENDER_ID:-STRYKEFOX      }
      ISA_RECEIVER_ID: ${ISA_RECEIVER_ID:-030240928      }
      ISA_SENDER_QUAL: ${ISA_SENDER_QUAL:-ZZ}
      ISA_RECEIVER_QUAL: ${ISA_RECEIVER_QUAL:-ZZ}
      EDI_DRY_RUN: ${EDI_DRY_RUN:-true}
      SUBMISSION_METHOD: ${SUBMISSION_METHOD:-stedi_api}
      ISA_TEST_INDICATOR: ${ISA_TEST_INDICATOR:-P}
      BILLING_NPI: ${BILLING_NPI:-1821959420}
      BILLING_TAX_ID: ${BILLING_TAX_ID:-393429726}
      BILLING_ORG_NAME: ${BILLING_ORG_NAME:-STRYKEFOX MEDICAL}
      BILLING_TAXONOMY: ${BILLING_TAXONOMY:-332B00000X}
      BILLING_PHONE: ${BILLING_PHONE:-6124996561}
      AVAILITY_SFTP_USER: ${AVAILITY_SFTP_USER:-}
      AVAILITY_SFTP_PASS: ${AVAILITY_SFTP_PASS:-}
      CORE_API_URL: ${CORE_API_URL:-http://core:8001}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      core:
        condition: service_healthy
    ports:
      - "127.0.0.1:8006:8006"
    networks:
      - poseidon_net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8006/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  availity:
    build:
      context: ./services/availity
      dockerfile: Dockerfile
    container_name: poseidon_availity
    restart: unless-stopped
    env_file: .env
    environment:
      SERVICE_NAME: availity
      PORT: 8005
      DATABASE_URL: ${POSEIDON_DATABASE_URL:-postgresql://poseidon:poseidon@postgres:5432/poseidon_db}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - poseidon_net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8005/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  # ---------------------------------------------------------------------------
  # FRONTEND
  # ---------------------------------------------------------------------------

  dashboard:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_AVAILITY_SERVICE_URL: ${NEXT_PUBLIC_AVAILITY_SERVICE_URL:-/availity-api}
    container_name: poseidon_dashboard
    restart: unless-stopped
    env_file: .env
    environment:
      SERVICE_NAME: dashboard
      PORT: 3000
      # Required by NextAuth; default keeps local Compose working if .env omits it (override in .env for real use).
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-poseidon-local-dev-nextauth-secret-min-32-chars-ok}
      # NextAuth: trust nginx X-Forwarded-* so the session origin matches the browser URL
      # (e.g. http://127.0.0.1 vs http://localhost). See next-auth utils/detect-origin.js.
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST:-true}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost}
      # NextAuth + BFF: server-side service URLs (compose DNS names)
      CORE_API_URL: ${CORE_API_URL:-http://core:8001}
      POSEIDON_API_URL: ${POSEIDON_API_URL:-http://core:8001}
      TRIDENT_API_URL: ${TRIDENT_API_URL:-http://trident:8002}
      INTAKE_API_URL: ${INTAKE_API_URL:-http://intake:8003}
      ML_API_URL: ${ML_API_URL:-http://ml:8004}
      # Server-side proxy for admin Availity routes (/api/integrations/availity/*)
      AVAILITY_SERVICE_URL: ${AVAILITY_SERVICE_URL:-http://availity:8005}
      # EDI service proxy (837P/835)
      EDI_API_URL: ${EDI_API_URL:-http://edi:8006}
      LITE_API_URL: ${LITE_API_URL:-http://lite:8010}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-poseidon-local-internal-key}
      # Trident Ask panel: LLM digest (set in .env for production-style local runs)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      TRIDENT_DIGEST_OPENAI_MODEL: ${TRIDENT_DIGEST_OPENAI_MODEL:-gpt-4o-mini}
      TRIDENT_DIGEST_ANTHROPIC_MODEL: ${TRIDENT_DIGEST_ANTHROPIC_MODEL:-claude-3-5-haiku-20241022}
      TRIDENT_DIGEST_PROVIDER: ${TRIDENT_DIGEST_PROVIDER:-auto}
      TRIDENT_DIGEST_LLM: ${TRIDENT_DIGEST_LLM:-}
      # Matia merge (optional): set MATIA_INTEGRATION_ENABLED=true and MATIA_API_URL=http://nginx/matia-api
      MATIA_API_URL: ${MATIA_API_URL:-}
      MATIA_PIPELINE_PATH: ${MATIA_PIPELINE_PATH:-/pipeline}
      MATIA_API_BEARER: ${MATIA_API_BEARER:-}
      MATIA_INTEGRATION_ENABLED: ${MATIA_INTEGRATION_ENABLED:-false}
    networks:
      poseidon_net:
        aliases:
          - dashboard
    depends_on:
      - core
      - trident
      - intake
      - lite
      - ml
      - availity
      - edi
    healthcheck:
      test: ["CMD", "wget", "--header=Host: dashboard.strykefox.com", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ---------------------------------------------------------------------------
  # REVERSE PROXY
  # ---------------------------------------------------------------------------

  nginx:
    image: nginx:1.29.6-alpine
    container_name: poseidon_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - poseidon_net
    depends_on:
      - core
      - trident
      - intake
      - ml
      - availity
      - edi
      - dashboard
    healthcheck:
      test: ["CMD", "wget", "--header=Host: dashboard.strykefox.com", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
