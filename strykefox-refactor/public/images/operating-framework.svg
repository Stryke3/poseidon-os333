<svg width="180" height="38" viewBox="0 0 180 38" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="frameworkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Framework icon -->
  <circle cx="12" cy="16" r="2" fill="url(#frameworkGradient)" opacity="0.9"/>
  <circle cx="20" cy="16" r="2" fill="url(#frameworkGradient)" opacity="0.7"/>
  <circle cx="16" cy="12" r="2" fill="url(#frameworkGradient)" opacity="0.7"/>
  <circle cx="16" cy="20" r="2" fill="url(#frameworkGradient)" opacity="0.9"/>
  <line x1="12" y1="16" x2="20" y2="16" stroke="url(#frameworkGradient)" stroke-width="1" opacity="0.5"/>
  <line x1="16" y1="12" x2="16" y2="20" stroke="url(#frameworkGradient)" stroke-width="1" opacity="0.5"/>
  
  <!-- Operating Framework Text -->
  <text x="28" y="18" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="url(#textGradient)" letter-spacing="0.3">OPERATING</text>
  <text x="28" y="28" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="url(#textGradient)" letter-spacing="0.3">FRAMEWORK</text>
</svg>
