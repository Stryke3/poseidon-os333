<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="metalGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#adb5bd;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="handleGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#495057;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#343a40;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="#f8f9fa"/>
  
  <!-- Scalpel set -->
  <g id="scalpels" transform="translate(50, 50)">
    <rect x="0" y="0" width="8" height="60" fill="url(#handleGradient)" rx="1"/>
    <polygon points="4,0 2,15 6,15" fill="url(#metalGradient)"/>
    <rect x="20" y="0" width="8" height="60" fill="url(#handleGradient)" rx="1"/>
    <polygon points="24,0 22,15 26,15" fill="url(#metalGradient)"/>
    <rect x="40" y="0" width="8" height="60" fill="url(#handleGradient)" rx="1"/>
    <polygon points="44,0 42,15 46,15" fill="url(#metalGradient)"/>
  </g>
  
  <!-- Forceps -->
  <g id="forceps" transform="translate(150, 40)">
    <path d="M20 0 Q25 20 30 40 L32 40 Q27 20 22 0" fill="url(#metalGradient)" stroke="#6c757d" stroke-width="1"/>
    <path d="M40 0 Q35 20 30 40 L32 40 Q37 20 42 0" fill="url(#metalGradient)" stroke="#6c757d" stroke-width="1"/>
    <circle cx="21" cy="0" r="3" fill="url(#handleGradient)"/>
    <circle cx="41" cy="0" r="3" fill="url(#handleGradient)"/>
    <circle cx="26" cy="20" r="2" fill="url(#metalGradient)"/>
    <circle cx="38" cy="20" r="2" fill="url(#metalGradient)"/>
  </g>
  
  <!-- Surgical scissors -->
  <g id="scissors" transform="translate(250, 60)">
    <path d="M0 0 Q15 10 30 0 L30 3 Q15 13 0 3" fill="url(#metalGradient)" stroke="#6c757d" stroke-width="1"/>
    <path d="M0 20 Q15 10 30 20 L30 23 Q15 13 0 23" fill="url(#metalGradient)" stroke="#6c757d" stroke-width="1"/>
    <circle cx="0" cy="2" r="2" fill="url(#handleGradient)"/>
    <circle cx="30" cy="2" r="2" fill="url(#handleGradient)"/>
    <circle cx="0" cy="22" r="2" fill="url(#handleGradient)"/>
    <circle cx="30" cy="22" r="2" fill="url(#handleGradient)"/>
    <circle cx="15" cy="11" r="1.5" fill="#6c757d"/>
  </g>
  
  <!-- Retractor set -->
  <g id="retractors" transform="translate(50, 150)">
    <path d="M0 0 Q20 10 40 0 L40 5 Q20 15 0 5" fill="url(#metalGradient)" stroke="#6c757d" stroke-width="1"/>
    <rect x="18" y="15" width="4" height="20" fill="url(#handleGradient)"/>
    
    <path d="M60 0 Q75 8 90 0 L90 4 Q75 12 60 4" fill="url(#metalGradient)" stroke="#6c757d" stroke-width="1"/>
    <rect x="73" y="12" width="4" height="18" fill="url(#handleGradient)"/>
  </g>
  
  <!-- Needle drivers -->
  <g id="needle-drivers" transform="translate(180, 150)">
    <rect x="0" y="0" width="4" height="40" fill="url(#metalGradient)"/>
    <rect x="-2" y="-5" width="8" height="10" rx="2" fill="url(#handleGradient)"/>
    <circle cx="2" cy="5" r="1" fill="#6c757d"/>
    
    <rect x="20" y="0" width="4" height="40" fill="url(#metalGradient)"/>
    <rect x="18" y="-5" width="8" height="10" rx="2" fill="url(#handleGradient)"/>
    <circle cx="22" cy="5" r="1" fill="#6c757d"/>
  </g>
  
  <!-- Surgical saw -->
  <g id="surgical-saw" transform="translate(250, 160)">
    <rect x="0" y="0" width="6" height="35" fill="url(#handleGradient)" rx="2"/>
    <rect x="1" y="30" width="4" height="20" fill="url(#metalGradient)"/>
    <path d="M1 50 L3 52 L5 50 L3 48 Z" fill="url(#metalGradient)"/>
    <path d="M1 54 L3 56 L5 54 L3 52 Z" fill="url(#metalGradient)"/>
    <path d="M1 58 L3 60 L5 58 L3 56 Z" fill="url(#metalGradient)"/>
  </g>
  
  <!-- Surgical drill -->
  <g id="surgical-drill" transform="translate(320, 140)">
    <rect x="0" y="10" width="12" height="25" fill="url(#handleGradient)" rx="3"/>
    <rect x="4" y="0" width="4" height="15" fill="url(#metalGradient)"/>
    <circle cx="6" cy="0" r="2" fill="url(#metalGradient)"/>
    <rect x="2" y="35" width="8" height="4" fill="#6c757d"/>
  </g>
  
  <!-- Labels -->
  <text x="70" y="130" font-family="Arial, sans-serif" font-size="8" fill="#6c757d">Scalpels</text>
  <text x="160" y="90" font-family="Arial, sans-serif" font-size="8" fill="#6c757d">Forceps</text>
  <text x="255" y="100" font-family="Arial, sans-serif" font-size="8" fill="#6c757d">Scissors</text>
  <text x="60" y="190" font-family="Arial, sans-serif" font-size="8" fill="#6c757d">Retractors</text>
  <text x="180" y="200" font-family="Arial, sans-serif" font-size="8" fill="#6c757d">Needle Drivers</text>
  <text x="250" y="220" font-family="Arial, sans-serif" font-size="8" fill="#6c757d">Surgical Saw</text>
  <text x="320" y="190" font-family="Arial, sans-serif" font-size="8" fill="#6c757d">Surgical Drill</text>
</svg>
