<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wallGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d1e7dd;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="floorGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#495057;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#343a40;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="lightGradient">
      <stop offset="0%" style="stop-color:#fff9e6;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#fff9e6;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Background walls -->
  <rect width="400" height="200" fill="url(#wallGradient)"/>
  
  <!-- Floor -->
  <rect y="200" width="400" height="100" fill="url(#floorGradient)"/>
  
  <!-- Operating table -->
  <rect x="150" y="160" width="100" height="60" rx="5" fill="#6c757d" stroke="#495057" stroke-width="2"/>
  <rect x="160" y="150" width="80" height="15" rx="3" fill="#6c757d" stroke="#495057" stroke-width="1"/>
  <rect x="145" y="220" width="110" height="8" rx="2" fill="#495057"/>
  
  <!-- Surgical lights -->
  <g id="lights">
    <circle cx="120" cy="50" r="25" fill="#f8f9fa" stroke="#6c757d" stroke-width="2"/>
    <circle cx="120" cy="50" r="20" fill="url(#lightGradient)"/>
    <rect x="118" y="75" width="4" height="60" fill="#6c757d"/>
    
    <circle cx="280" cy="50" r="25" fill="#f8f9fa" stroke="#6c757d" stroke-width="2"/>
    <circle cx="280" cy="50" r="20" fill="url(#lightGradient)"/>
    <rect x="278" y="75" width="4" height="60" fill="#6c757d"/>
  </g>
  
  <!-- Anesthesia machine -->
  <g id="anesthesia">
    <rect x="50" y="140" width="40" height="80" rx="4" fill="#e9ecef" stroke="#6c757d" stroke-width="2"/>
    <rect x="55" y="145" width="30" height="20" rx="2" fill="#007bff" opacity="0.7"/>
    <circle cx="70" cy="155" r="3" fill="#28a745"/>
    <rect x="60" y="170" width="20" height="10" fill="#6c757d"/>
    <rect x="60" y="185" width="20" height="10" fill="#6c757d"/>
    <rect x="65" y="200" width="10" height="20" fill="#495057"/>
  </g>
  
  <!-- Monitor -->
  <g id="monitor">
    <rect x="310" y="120" width="60" height="45" rx="3" fill="#212529" stroke="#6c757d" stroke-width="2"/>
    <rect x="315" y="125" width="50" height="35" fill="#00008b"/>
    <polyline points="320,145 330,140 340,150 350,135 360,145" stroke="#00ff00" stroke-width="2" fill="none"/>
    <circle cx="335" cy="155" r="2" fill="#ff0000"/>
    <circle cx="345" cy="155" r="2" fill="#00ff00"/>
    <rect x="335" y="170" width="10" height="15" fill="#6c757d"/>
  </g>
  
  <!-- IV pole -->
  <g id="iv-pole">
    <rect x="270" y="100" width="3" height="120" fill="#6c757d"/>
    <rect x="265" y="95" width="13" height="8" rx="2" fill="#6c757d"/>
    <rect x="260" y="110" width="20" height="3" fill="#6c757d"/>
    <rect x="260" y="130" width="20" height="3" fill="#6c757d"/>
    <rect x="268" y="220" width="7" height="15" fill="#495057"/>
  </g>
  
  <!-- Storage cabinets -->
  <g id="cabinets">
    <rect x="10" y="80" width="35" height="50" rx="2" fill="#e9ecef" stroke="#6c757d" stroke-width="1"/>
    <rect x="15" y="85" width="25" height="15" fill="#6c757d"/>
    <rect x="15" y="105" width="25" height="15" fill="#6c757d"/>
    
    <rect x="355" y="80" width="35" height="50" rx="2" fill="#e9ecef" stroke="#6c757d" stroke-width="1"/>
    <rect x="360" y="85" width="25" height="15" fill="#6c757d"/>
    <rect x="360" y="105" width="25" height="15" fill="#6c757d"/>
  </g>
  
  <!-- Floor reflection -->
  <ellipse cx="200" cy="240" rx="80" ry="15" fill="#fff" opacity="0.1"/>
</svg>
