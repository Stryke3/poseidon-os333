# Canonical GitHub Actions workflow for POSEIDON.
#
# GitHub rejects HTTPS pushes that add or change files under .github/workflows/ when using
# a fine-grained PAT without the "workflow" scope. Keep the definition here and install it
# with:  ./scripts/ci/install_github_workflow.sh
#
# Or copy manually:  cp scripts/ci/github-actions-ci.yml .github/workflows/ci.yml

name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify deploy readiness
        run: bash scripts/verify_deploy_readiness.sh
