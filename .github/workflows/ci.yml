name: Poseidon Lite CI

on:
  push:
    branches:
      - main
      - "cursor/**"
      - "feature/**"
  pull_request:
    branches:
      - main

jobs:
  frontend-typecheck:
    name: Frontend Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: cd frontend && npm ci

      - name: Type check
        run: cd frontend && npx tsc --noEmit

  lite-service-check:
    name: Lite Service Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install fastapi uvicorn pydantic asyncpg python-multipart

      - name: Syntax check
        run: python -m py_compile services/lite/main.py

