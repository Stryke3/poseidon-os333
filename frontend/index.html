<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0B1F3A" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <title>Poseidon — A CRM meets EMR</title>
    <script src="/vendor/react.production.min.js?v=20260318a"></script>
    <script src="/vendor/react-dom.production.min.js?v=20260318a"></script>
    <script src="/vendor/xlsx.full.min.js?v=20260318a"></script>
    <style>
      html, body, #root { margin: 0; min-height: 100%; -webkit-text-size-adjust: 100%; }
      body { background: #0B1F3A; padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }
      * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
      .boot-fallback {
        min-height: 100vh;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 24px;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
      }
      .boot-fallback__card {
        width: min(100%, 420px);
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.14);
        border-radius: 20px;
        padding: 24px;
        box-shadow: 0 24px 80px rgba(0,0,0,0.35);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }
      .boot-fallback__title {
        margin: 0 0 10px;
        font-size: 20px;
        font-weight: 700;
      }
      .boot-fallback__body {
        margin: 0;
        color: rgba(255,255,255,0.78);
        line-height: 1.5;
      }
      .boot-fallback__detail {
        margin-top: 12px;
        padding: 12px 14px;
        border-radius: 12px;
        background: rgba(0,0,0,0.22);
        border: 1px solid rgba(255,255,255,0.08);
        color: #ffd7d3;
        font-family: ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace;
        font-size: 12px;
        white-space: pre-wrap;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="boot-fallback" class="boot-fallback">
      <div class="boot-fallback__card">
        <h1 class="boot-fallback__title">Poseidon could not finish loading.</h1>
        <p class="boot-fallback__body">Refresh once. If it still stays blank, open DevTools and check the Console for the first script error.</p>
        <div id="boot-fallback-detail" class="boot-fallback__detail" hidden></div>
      </div>
    </div>
    <script>
      function showBootFallback(detail) {
        var fallback = document.getElementById("boot-fallback");
        var detailNode = document.getElementById("boot-fallback-detail");
        if (fallback && !document.getElementById("root").children.length) {
          fallback.style.display = "flex";
          if (detail && detailNode) {
            detailNode.hidden = false;
            detailNode.textContent = detail;
          }
        }
      }

      window.addEventListener("error", function (event) {
        var message = event && event.message ? event.message : "Unknown boot error";
        var source = event && event.filename ? event.filename : "";
        var line = event && event.lineno ? ":" + event.lineno : "";
        var stack = event && event.error && event.error.stack ? "\n\n" + event.error.stack : "";
        showBootFallback(source ? message + "\n" + source + line + stack : message + stack);
      });

      window.addEventListener("unhandledrejection", function (event) {
        var reason = event && event.reason;
        var detail = typeof reason === "string" ? reason : (reason && reason.stack) ? reason.stack : (reason && reason.message) ? reason.message : "Unhandled promise rejection";
        showBootFallback(detail);
      });
    </script>
    <script src="/src/App.js?v=20260318a"></script>
  </body>
</html>
