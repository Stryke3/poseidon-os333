<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8f0fa"/>
      <stop offset="100%" stop-color="#f3f7fc"/>
    </linearGradient>
    <linearGradient id="scrubs" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a5da8"/>
      <stop offset="100%" stop-color="#1a3c6e"/>
    </linearGradient>
  </defs>
  <rect width="640" height="480" fill="url(#bg)"/>
  <!-- Clinical room elements -->
  <rect x="0" y="360" width="640" height="120" fill="#dce3ed" opacity="0.5"/>
  <rect x="420" y="120" width="180" height="260" rx="8" fill="#ffffff" stroke="#cdd5e0" stroke-width="1"/>
  <!-- Monitor -->
  <rect x="440" y="140" width="140" height="90" rx="4" fill="#0d1f3c"/>
  <path d="M450 180 L470 170 L490 185 L510 165 L530 175 L550 160 L570 172" stroke="#06b6d4" stroke-width="2" fill="none"/>
  <path d="M450 200 L470 195 L490 205 L510 190 L530 198 L550 188 L570 195" stroke="#0fa86a" stroke-width="1.5" fill="none" opacity="0.7"/>
  <text x="450" y="220" fill="#06b6d4" font-size="8" font-family="monospace">HR: 72 bpm</text>
  <text x="450" y="228" fill="#0fa86a" font-size="7" font-family="monospace">SpO2: 98%</text>
  <!-- IV stand -->
  <line x1="400" y1="100" x2="400" y2="340" stroke="#8e9ab0" stroke-width="2"/>
  <rect x="388" y="100" width="24" height="40" rx="4" fill="#e8f0fa" stroke="#cdd5e0"/>
  <circle cx="400" cy="340" r="8" fill="#cdd5e0"/>
  <!-- Nurse figure -->
  <circle cx="200" cy="160" r="28" fill="#f5deb3"/>
  <rect x="172" y="188" width="56" height="80" rx="6" fill="url(#scrubs)"/>
  <rect x="168" y="268" width="64" height="50" rx="4" fill="url(#scrubs)"/>
  <!-- Stethoscope -->
  <path d="M210 200 Q230 220 225 240" stroke="#5a6577" stroke-width="2" fill="none"/>
  <circle cx="225" cy="242" r="6" fill="#5a6577"/>
  <!-- Clipboard -->
  <rect x="155" y="230" width="30" height="40" rx="2" fill="#ffffff" stroke="#cdd5e0"/>
  <line x1="162" y1="240" x2="178" y2="240" stroke="#cdd5e0" stroke-width="1"/>
  <line x1="162" y1="248" x2="178" y2="248" stroke="#cdd5e0" stroke-width="1"/>
  <line x1="162" y1="256" x2="175" y2="256" stroke="#cdd5e0" stroke-width="1"/>
  <!-- Patient (seated/reclined) -->
  <circle cx="310" cy="200" r="24" fill="#d2b48c"/>
  <rect x="286" y="224" width="48" height="60" rx="6" fill="#87ceeb" opacity="0.7"/>
  <rect x="280" y="284" width="60" height="50" rx="4" fill="#e8f0fa" stroke="#cdd5e0"/>
  <!-- Bed -->
  <rect x="260" y="330" width="140" height="16" rx="4" fill="#ffffff" stroke="#cdd5e0"/>
  <rect x="260" y="346" width="8" height="20" fill="#8e9ab0"/>
  <rect x="392" y="346" width="8" height="20" fill="#8e9ab0"/>
  <!-- Cross / medical symbol -->
  <rect x="50" y="400" width="30" height="30" rx="4" fill="#2a5da8" opacity="0.15"/>
  <rect x="60" y="406" width="10" height="18" rx="1" fill="#2a5da8" opacity="0.3"/>
  <rect x="54" y="411" width="22" height="8" rx="1" fill="#2a5da8" opacity="0.3"/>
</svg>
