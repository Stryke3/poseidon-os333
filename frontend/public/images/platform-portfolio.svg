<svg width="180" height="38" viewBox="0 0 180 38" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="platformGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#764ba2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f093fb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Platform icon -->
  <rect x="8" y="10" width="6" height="6" fill="url(#platformGradient)" opacity="0.9" rx="1"/>
  <rect x="16" y="10" width="6" height="6" fill="url(#platformGradient)" opacity="0.7" rx="1"/>
  <rect x="8" y="18" width="6" height="6" fill="url(#platformGradient)" opacity="0.7" rx="1"/>
  <rect x="16" y="18" width="6" height="6" fill="url(#platformGradient)" opacity="0.9" rx="1"/>
  
  <!-- Platform Portfolio Text -->
  <text x="28" y="18" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="url(#textGradient)" letter-spacing="0.3">PLATFORM</text>
  <text x="28" y="28" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="url(#textGradient)" letter-spacing="0.3">PORTFOLIO</text>
</svg>
